name: tradesync

services:
  # --- Infrastructure Layer ---
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 30

  # --- Schema Initialization ---
  schema-init:
    image: python:3.11-slim
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DB_HOST: postgres
      DB_PORT: 5432
    volumes:
      - ./ops:/app/ops
    working_dir: /app
    command: >
      sh -c " pip install --no-cache-dir asyncpg && python ops/apply_schema.py "
    restart: "no"

  # --- Application Services ---
  state-api:
    build:
      context: ./services/state-api
      dockerfile: Dockerfile
    image: tradesync/state-api:dev
    depends_on:
      postgres:
        condition: service_healthy
      schema-init:
        condition: service_completed_successfully
    environment:
      PG_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "${STATE_API_PORT:-8000}:8000"
    restart: unless-stopped

  ingest-gateway:
    build:
      context: ./services/ingest-gateway
      dockerfile: Dockerfile
    image: tradesync/ingest-gateway:dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      schema-init:
        condition: service_completed_successfully
    environment:
      PG_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${INGEST_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  pgdata:
  qdrantdata:
